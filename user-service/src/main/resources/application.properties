spring.application.name=user-service
server.port=8081

payment-service.url=http://localhost:8082

# Configure Feign client named "payment-service"
spring.cloud.openfeign.client.config.payment-service.connect-timeout=2000
spring.cloud.openfeign.client.config.payment-service.read-timeout=5000


#spring.cloud.openfeign.client.config.default.connect-timeout=3000
#spring.cloud.openfeign.client.config.default.read-timeout=7000

  spring.cloud.openfeign.circuitbreaker.enabled=true
  
resilience4j.circuitbreaker.configs.default.sliding-window-size=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
 
  
  
  management.endpoints.web.exposure.include=health,circuitbreakers
  management.endpoint.health.show-details=always
  management.health.circuitbreakers.enabled=true
  